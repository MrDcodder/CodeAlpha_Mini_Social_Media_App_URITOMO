nit:"4px","container-max":"1200px"},fontFamily:{"body-md":["Plus Jakarta Sans"],"label-bold":["Hanken Grotesk"],"display-lg":["Plus Jakarta Sans"],"headline-md":["Plus Jakarta Sans"],"body-lg":["Plus Jakarta Sans"]},fontSize:{"body-md":["14px",{lineHeight:"20px",fontWeight:"400"}],"label-bold":["12px",{lineHeight:"16px",letterSpacing:"0.05em",fontWeight:"700"}],"display-lg":["40px",{lineHeight:"48px",letterSpacing:"-0.02em",fontWeight:"800"}],"headline-md":["24px",{lineHeight:"32px",letterSpacing:"-0.01em",fontWeight:"700"}],"body-lg":["16px",{lineHeight:"24px",fontWeight:"400"}]}}}}catch(_e){}</script></head><body class="bg-background text-on-surface font-body-md">
<main class="max-w-2xl mx-auto px-4 md:px-6 pt-6 pb-24">
<header class="flex items-center justify-between mb-8">
<div class="flex items-center gap-4"><a href="/" class="material-symbols-outlined text-primary">arrow_back</a><h1 class="font-headline-md text-headline-md text-on-surface">Notifications</h1></div>
<button onclick="markAllRead()" class="text-primary font-label-bold text-sm hover:underline">Mark all read</button>
</header>
<div id="notifications-list" class="space-y-3"><div class="text-center py-16 text-on-surface-variant">Loading...</div></div>
</main>
<script src="/app.js"></script>
<script>
async function loadNotifications() {
  try {
    const data = await getNotifications();
    const list = document.getElementById('notifications-list');
    if (data.notifications.length === 0) {
      list.innerHTML = '<div class="text-center py-16 text-on-surface-variant"><span class="material-symbols-outlined text-6xl">notifications_none</span><p class="mt-4">No notifications yet</p></div>';
      return;
    }
    list.innerHTML = data.notifications.map(n => `
      <div class="flex items-center gap-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-4 ${!n.is_read ? 'border-l-4 border-l-primary' : ''}">
        <div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden"><img class="w-full h-full object-cover" src="${escapeHtml(n.avatar_url || '')}"></div>
        <div class="flex-1">
          <p class="text-body-md"><span class="font-bold">${escapeHtml(n.display_name || 'Someone')}</span> 
            ${n.type === 'like' ? 'liked your post' : n.type === 'comment' ? 'commented on your post' : n.type === 'follow' ? 'followed you' : 'interacted with your content'}
          </p>
          <p class="text-xs text-on-surface-variant">${formatTime(n.created_at)}</p>
        </div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('notifications-list').innerHTML = '<div class="text-center py-16 text-error">Failed to load</div>';
  }
}

async function markAllRead() {
  try {
    await markAllNotificationsRead();
    showToast('All marked as read');
    loadNotifications();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

loadNotifications();
</script>
</body></html>

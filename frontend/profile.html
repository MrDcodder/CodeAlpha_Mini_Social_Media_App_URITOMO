<a href="#" class="flex flex-col items-center gap-1 text-primary scale-110"><span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">person</span><span class="font-label-bold text-[10px]">User</span></a>
<a href="/settings.html" class="flex flex-col items-center gap-1 text-on-secondary-container"><span class="material-symbols-outlined">menu</span><span class="font-label-bold text-[10px]">Menu</span></a>
</nav>
<script src="/app.js"></script>
<script>
if (!requireAuth()) {}

const urlParams = new URLSearchParams(window.location.search);
const profileId = urlParams.get('id') || getUser()?.id;

async function loadProfile() {
  try {
    const data = await getUserProfile(profileId);
    const u = data.user;
    const currentUser = getUser();
    const isOwn = currentUser?.id === u.id;
    const profileCompletion = getProfileCompletionStatus(u);

    document.getElementById('profile-content').innerHTML = `
      <div class="rounded-[32px] border border-outline-variant/40 bg-surface-container-lowest overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.2)]">
        <div class="h-40 md:h-56 bg-gradient-to-r from-primary/30 via-primary/10 to-surface-container-high"></div>
        <div class="px-5 md:px-8 pb-8">
          <div class="-mt-14 md:-mt-16 flex flex-col md:flex-row md:items-end md:justify-between gap-6">
            <div class="flex flex-col md:flex-row items-start md:items-end gap-5">
              <div class="relative">
                <div class="w-28 h-28 md:w-36 md:h-36 rounded-full border-4 border-background bg-surface-container-high overflow-hidden shadow-2xl">
                  <img class="w-full h-full object-cover" src="${escapeHtml(u.avatar_url || 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=400&q=80')}" alt="${escapeHtml(u.display_name || u.username)}">
                </div>
                ${u.is_verified ? '<div class="absolute bottom-2 right-2 w-6 h-6 bg-primary rounded-full border-2 border-background flex items-center justify-center"><span class="material-symbols-outlined text-[12px] text-on-primary" style="font-variation-settings:\'FILL\'1">verified</span></div>' : ''}
              </div>
              <div class="pb-2">
                <div class="flex items-center gap-2">
                  <h1 class="font-headline-md text-headline-md text-on-surface">${escapeHtml(u.display_name || u.username)}</h1>
                  ${u.is_pro ? '<span class="rounded-full border border-primary/40 bg-primary/10 px-3 py-1 text-[11px] uppercase tracking-[0.2em] text-primary">Pro</span>' : ''}
                </div>
                <p class="text-on-surface-variant font-body-md">@${escapeHtml(u.username)}</p>
              </div>
            </div>
            <div class="flex gap-3 pb-2">
              ${!isOwn ? `<button onclick="toggleFollow('${u.id}', this)" class="px-6 py-3 bg-primary text-on-primary font-label-bold rounded-xl active:scale-95 transition-all" id="follow-btn">Follow</button>` : `<a href="/profile-setup.html"><button class="px-6 py-3 bg-primary-container text-on-primary-container font-label-bold rounded-xl active:scale-95 transition-all">Edit Profile</button></a>`}
              ${isOwn ? `<a href="/settings.html"><button class="px-6 py-3 border border-outline-variant/40 bg-surface-container text-on-surface font-label-bold rounded-xl active:scale-95 transition-all">Settings</button></a>` : ''}
            </div>
          </div>

          ${!profileCompletion.isComplete ? `
            <div class="mt-6 rounded-2xl border border-primary/30 bg-primary/10 p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
              <div>
                <p class="font-label-bold uppercase text-[11px] tracking-[0.2em] text-primary">Complete your profile</p>
                <p class="text-on-surface-variant">Add a bio, photo, and a few details so your profile feels personal.</p>
              </div>
              <a href="/profile-setup.html" class="inline-flex items-center justify-center rounded-xl bg-primary px-4 py-2 text-on-primary font-label-bold">Finish setup</a>
            </div>
          ` : ''}

          <div class="mt-8 grid gap-6 lg:grid-cols-[1.3fr_0.7fr]">
            <div>
              <p class="font-body-lg text-body-lg text-on-surface leading-relaxed max-w-2xl">${escapeHtml(u.bio || 'Add a bio to tell people who you are.')}</p>
              <div class="mt-6 flex flex-wrap gap-4">
                ${u.location ? `<div class="flex items-center gap-1 text-on-surface-variant"><span class="material-symbols-outlined text-sm">location_on</span><span class="font-body-md">${escapeHtml(u.location)}</span></div>` : ''}
                ${u.website ? `<div class="flex items-center gap-1 text-primary"><span class="material-symbols-outlined text-sm">link</span><a class="font-body-md hover:underline" href="${escapeHtml(u.website)}" target="_blank">${escapeHtml(u.website)}</a></div>` : ''}
                <div class="flex items-center gap-1 text-on-surface-variant"><span class="material-symbols-outlined text-sm">calendar_today</span><span class="font-body-md">Joined ${new Date(u.joined_date + 'Z').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</span></div>
              </div>
            </div>
            <div class="grid grid-cols-3 gap-2">
              <div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-4 text-center"><span class="font-headline-md text-headline-md text-primary">${u.follower_count}</span><span class="font-label-bold text-label-bold text-on-surface-variant block text-[10px] uppercase">Followers</span></div>
              <div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-4 text-center"><span class="font-headline-md text-headline-md text-primary">${u.following_count}</span><span class="font-label-bold text-label-bold text-on-surface-variant block text-[10px] uppercase">Following</span></div>
              <div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-4 text-center"><span class="font-headline-md text-headline-md text-primary">${u.post_count}</span><span class="font-label-bold text-label-bold text-on-surface-variant block text-[10px] uppercase">Posts</span></div>
            </div>
          </div>
        </div>
      </div>
      <div id="user-posts" class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4 pb-12"></div>
    `;

    const postsData = await getUserPosts(profileId);
    const postsGrid = document.getElementById('user-posts');
    if (postsData.posts.length === 0) {
      postsGrid.innerHTML = '<div class="col-span-3 text-center py-12 text-on-surface-variant">No posts yet.</div>';
    } else {
      postsGrid.innerHTML = postsData.posts.map(p => `
        <div class="group relative aspect-square bg-surface-container-lowest border border-outline-variant/40 rounded-xl overflow-hidden cursor-pointer">
          ${p.media_url ? `<img class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" src="${escapeHtml(p.media_url)}">` : `<div class="w-full h-full flex items-center justify-center p-4 text-center text-on-surface-variant">${escapeHtml(p.content?.substring(0,100))}</div>`}
          <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-6">
            <div class="flex items-center gap-1 text-white"><span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">favorite</span> ${p.like_count}</div>
            <div class="flex items-center gap-1 text-white"><span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">chat_bubble</span> ${p.comment_count}</div>
          </div>
        </div>
      `).join('');
    }
  } catch (err) {
    document.getElementById('profile-content').innerHTML = '<div class="text-center py-20"><p class="text-error">Failed to load profile</p></div>';
  }
}

async function toggleFollow(userId, btn) {
  try {
    if (btn.textContent === 'Follow') {
      await followUser(userId);
      btn.textContent = 'Following';
      btn.classList.remove('bg-primary', 'text-on-primary');
      btn.classList.add('bg-surface-container', 'text-on-surface', 'border', 'border-outline-variant');
      showToast('Followed!');
    } else {
      await unfollowUser(userId);
      btn.textContent = 'Follow';
      btn.classList.add('bg-primary', 'text-on-primary');
      btn.classList.remove('bg-surface-container', 'text-on-surface', 'border', 'border-outline-variant');
      showToast('Unfollowed');
    }
  } catch (err) {
    showToast(err.message, 'error');
  }
}

loadProfile();
</script>
</body></html>

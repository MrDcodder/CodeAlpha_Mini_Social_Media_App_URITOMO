<div><label class="font-label-bold text-label-bold text-on-surface-variant block mb-2">Password</label><input type="password" id="login-password" class="w-full bg-surface-container border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="••••••••"></div>

<div><label class="font-label-bold text-label-bold text-on-surface-variant block mb-2">Email</label><input type="email" id="reg-email" class="w-full bg-surface-container border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="your@email.com"></div>

<div><label class="font-label-bold text-label-bold text-on-surface-variant block mb-2">Password</label><input type="password" id="reg-password" class="w-full bg-surface-container border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="••••••••"></div>
<div><label class="font-label-bold text-label-bold text-on-surface-variant block mb-2">Bio</label><textarea id="reg-bio" maxlength="220" class="w-full bg-surface-container border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-transparent min-h-[90px]" placeholder="Tell people who you are"></textarea></div>

<div><label class="font-label-bold text-label-bold text-on-surface-variant block mb-2">Website</label><input type="url" id="reg-website" class="w-full bg-surface-container border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="https://example.com"></div>
</div>
<div class="rounded-2xl border border-outline-variant/40 bg-surface-container p-4">
<label class="font-label-bold text-label-bold text-on-surface-variant block mb-3">Profile Photo</label>
<div class="flex items-center gap-4">
<label class="flex h-16 w-16 cursor-pointer items-center justify-center rounded-full border border-dashed border-primary/40 bg-surface-container-lowest text-primary">
<input id="reg-avatar" type="file" accept="image/*" required class="hidden" onchange="previewRegistrationAvatar(this)">
<span class="material-symbols-outlined text-2xl">add_a_photo</span>
</label>
<p class="text-sm text-on-surface-variant">A profile photo is required so your profile feels complete.</p>
</div>

<p id="register-error" class="text-error text-center text-sm hidden"></p>
</div>
</div>
<div class="text-center mt-6"><p class="text-on-surface-variant text-sm">By continuing, you agree to the <a href="#" class="text-primary hover:underline">Terms</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a></p></div>
</div>
<script src="/app.js"></script>
<script>
if (redirectIfAuth()) {}

const loginTab = document.getElementById('tab-login');
const registerTab = document.getElementById('tab-register');
const loginForm = document.getElementById('login-form');
const registerForm = document.getElementById('register-form');

loginTab.addEventListener('click', () => {
  loginTab.classList.add('bg-primary', 'text-on-primary');
  loginTab.classList.remove('text-on-surface-variant');
  registerTab.classList.remove('bg-primary', 'text-on-primary');
  registerTab.classList.add('text-on-surface-variant');
  loginForm.classList.remove('hidden');
  registerForm.classList.add('hidden');
});

registerTab.addEventListener('click', () => {
  registerTab.classList.add('bg-primary', 'text-on-primary');
  registerTab.classList.remove('text-on-surface-variant');
  loginTab.classList.remove('bg-primary', 'text-on-primary');
  loginTab.classList.add('text-on-surface-variant');
  registerForm.classList.remove('hidden');
  loginForm.classList.add('hidden');
});

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  
  if (!email || !password) {
    errorEl.textContent = 'Please fill in all fields';
    errorEl.classList.remove('hidden');
    return;
  }
  
  try {
    errorEl.classList.add('hidden');
    await login(email, password);
    showToast('Welcome to the grid!');
    setTimeout(() => window.location.href = '/', 500);
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.remove('hidden');
  }
});

let registrationAvatarDataUrl = '';

async function previewRegistrationAvatar(input) {
  const file = input.files?.[0];
  if (!file) return;
  registrationAvatarDataUrl = await readFileAsDataUrl(file);
  const preview = document.getElementById('reg-avatar-preview');
  preview.src = registrationAvatarDataUrl;
  preview.classList.remove('hidden');
}

document.getElementById('register-btn').addEventListener('click', async () => {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const display = document.getElementById('reg-display').value.trim();
  const password = document.getElementById('reg-password').value;
  const bio = document.getElementById('reg-bio').value.trim();
  const location = document.getElementById('reg-location').value.trim();
  const website = document.getElementById('reg-website').value.trim();
  const errorEl = document.getElementById('register-error');
  
  if (!username || !email || !password || !display || !bio || !registrationAvatarDataUrl) {
    errorEl.textContent = 'Please fill in all required fields and upload a profile photo';
    errorEl.classList.remove('hidden');
    return;
  }
  
  try {
    errorEl.classList.add('hidden');
    await register(username, email, password, display, {
      bio,
      location,
      website,
      avatar_url: registrationAvatarDataUrl
    });
    showToast('Account created! Welcome to Uritomo.');
    setTimeout(() => window.location.href = '/', 500);
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.remove('hidden');
  }
});
</script>
</body></html>

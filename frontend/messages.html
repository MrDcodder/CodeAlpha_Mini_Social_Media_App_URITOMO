<script>
if (!requireAuth()) {}

let selectedUserId = null;

async function loadConversations() {
  try {
    const data = await getConversations();
    const list = document.getElementById('conversations-list');
    if (data.conversations.length === 0) {
      list.innerHTML = '<div class="text-center py-12 text-on-surface-variant px-6">No conversations yet. Start chatting!</div>';
      return;
    }
    list.innerHTML = data.conversations.map(c => `
      <div class="flex items-center gap-4 px-6 py-4 hover:bg-surface-variant/30 cursor-pointer border-b border-outline-variant/10 ${selectedUserId === c.user_id ? 'bg-primary/5 border-r-2 border-primary' : ''}" onclick="selectConversation('${c.user_id}', '${escapeHtml(c.display_name)}', '${escapeHtml(c.avatar_url)}')">
        <div class="w-12 h-12 rounded-full bg-surface-container-high overflow-hidden"><img class="w-full h-full object-cover" src="${escapeHtml(c.avatar_url)}"></div>
        <div class="flex-1 min-w-0">
          <div class="flex justify-between"><h3 class="font-label-bold text-on-surface truncate">${escapeHtml(c.display_name)}</h3><span class="text-[10px] text-on-surface-variant">${formatTime(c.last_message_at)}</span></div>
          <p class="text-body-md text-on-surface-variant truncate">${c.last_sender_id === getUser()?.id ? 'You: ' : ''}${escapeHtml(c.last_message || '')}</p>
        </div>
        ${c.unread_count > 0 ? `<span class="bg-primary text-on-primary text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center">${c.unread_count}</span>` : ''}
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('conversations-list').innerHTML = '<div class="text-center py-12 text-error">Failed to load</div>';
  }
}

function selectConversation(userId, displayName, avatarUrl) {
  selectedUserId = userId;
  document.getElementById('chat-area').classList.remove('hidden');
  document.getElementById('chat-placeholder').classList.add('hidden');
  document.getElementById('chat-name').textContent = displayName;
  document.getElementById('chat-avatar').innerHTML = `<img class="w-full h-full rounded-full object-cover" src="${avatarUrl}">`;
  document.getElementById('chat-status').textContent = 'Online';
  loadMessages(userId);
  loadConversations();
}

async function loadMessages(userId) {
  try {
    const data = await getMessages(userId);
    const container = document.getElementById('chat-messages');
    const currentUserId = getUser().id;
    
    container.innerHTML = data.messages.map(m => `
      <div class="flex ${m.sender_id === currentUserId ? 'justify-end' : 'justify-start'}">
        <div class="max-w-[70%] ${m.sender_id === currentUserId ? 'bg-primary text-on-primary rounded-2xl rounded-br-none' : 'bg-surface-container text-on-surface rounded-2xl rounded-bl-none'} p-4">
          <p class="text-body-md">${escapeHtml(m.content)}</p>
          <span class="text-[10px] mt-2 block text-right ${m.sender_id === currentUserId ? 'text-on-primary/60' : 'text-on-surface-variant'}">${formatTime(m.created_at)}</span>
        </div>
      </div>
    `).join('');
    
    container.scrollTop = container.scrollHeight;
  } catch (err) {
    showToast('Failed to load messages', 'error');
  }
}

async function sendMessage() {
  const input = document.getElementById('message-input');
  const content = input.value.trim();
  if (!content || !selectedUserId) return;
  
  try {
    await sendMessage(selectedUserId, content);
    input.value = '';
    loadMessages(selectedUserId);
  } catch (err) {
    showToast('Failed to send message', 'error');
  }
}

document.getElementById('message-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage();
});

loadConversations();
</script>

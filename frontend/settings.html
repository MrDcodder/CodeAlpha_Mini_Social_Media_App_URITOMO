<script src="/app.js"></script>
<script>
if (!requireAuth()) {}

const user = getUser();

function loadSettings() {
  document.getElementById('edit-display').value = user.display_name || '';
  document.getElementById('edit-bio').value = user.bio || '';
  document.getElementById('edit-location').value = user.location || '';
  document.getElementById('edit-website').value = user.website || '';
  document.getElementById('settings-avatar').style.backgroundImage = `url('${user.avatar_url}')`;
  if (user.avatar_url) {
    document.getElementById('edit-avatar-preview').src = user.avatar_url;
    document.getElementById('edit-avatar-preview').classList.remove('hidden');
  }
}

async function saveProfile() {
  let avatar_url = user.avatar_url || '';
  const avatarFile = document.getElementById('edit-avatar-file').files?.[0];

  if (avatarFile) {
    avatar_url = await readFileAsDataUrl(avatarFile);
  }

  const data = {
    display_name: document.getElementById('edit-display').value,
    bio: document.getElementById('edit-bio').value,
    location: document.getElementById('edit-location').value,
    website: document.getElementById('edit-website').value,
    avatar_url
  };

  try {
    const result = await updateProfile(user.id, data);
    localStorage.setItem('uritomo_user', JSON.stringify(result.user));
    showToast('Profile updated!');
  } catch (err) {
    showToast(err.message, 'error');
  }
}

loadSettings();
</script>

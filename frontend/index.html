<!-- Create Post Modal -->
<div id="create-post-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden"><div class="bg-surface-container-lowest border border-outline-variant/40 rounded-2xl p-6 w-full max-w-lg mx-4 shadow-2xl"><div class="flex justify-between items-center mb-4"><h3 class="font-headline-md text-headline-md text-on-surface">Create Post</h3><button class="material-symbols-outlined text-on-surface-variant" onclick="hideCreatePostModal()">close</button></div>
<textarea id="post-content" class="w-full bg-surface-container border border-outline-variant/30 rounded-xl p-4 text-on-surface min-h-[120px] focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="What's on your mind?"></textarea>
<div class="flex gap-3 mt-4"><input type="text" id="post-media-url" class="flex-1 bg-surface-container border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Image URL (optional)"></div>
<div class="flex gap-3 mt-4">
<select id="post-type" class="bg-surface-container border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary"><option value="multimedia">Multimedia</option><option value="literature">Literature</option></select>
<button id="submit-post-btn" class="flex-1 bg-primary text-on-primary py-3 rounded-xl font-label-bold hover:shadow-[0_0_15px_rgba(219,184,255,0.3)] active:scale-95 transition-all">Publish</button>
</div></div></div>
<script src="/app.js"></script>
<script>
let currentFeed = 'multimedia';
let currentPage = 1;
let loading = false;

// Check auth
if (!requireAuth()) {}

// Set user info
const user = getUser();
if (user) {
  document.getElementById('topbar-avatar-img').src = user.avatar_url;
  const profileLinks = document.querySelectorAll('#nav-profile');
  profileLinks.forEach(el => {
    el.href = `/profile.html?id=${user.id}`;
  });
}

// Load feed
async function loadFeed(type, page = 1, append = false) {
  if (loading) return;
  loading = true;
  document.getElementById('feed-loader').classList.remove('hidden');
  
  try {
    const data = await getPosts(type, page, 5);
    const container = document.getElementById(type === 'literature' ? 'literature-feed' : 'multimedia-feed');
    
    if (!append) container.innerHTML = '';
    
    if (data.posts.length === 0 && !append) {
      container.innerHTML = '<div class="text-center py-12 text-on-surface-variant"><span class="material-symbols-outlined text-4xl mb-4">inbox</span><p>No posts yet. Be the first!</p></div>';
      return;
    }
    
    data.posts.forEach(post => {
      container.appendChild(createPostElement(post));
    });
    
    currentPage = page;
  } catch (err) {
    showToast('Failed to load feed', 'error');
  } finally {
    loading = false;
    document.getElementById('feed-loader').classList.add('hidden');
  }
}

function createPostElement(post) {
  const article = document.createElement('article');
  article.className = 'bg-surface-container-lowest border border-outline-variant/40 rounded-xl overflow-hidden shadow-2xl group';
  
  let mediaHtml = '';
  if (post.media_url) {
    mediaHtml = `<div class="aspect-square bg-surface-container-high relative overflow-hidden"><img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" src="${escapeHtml(post.media_url)}" alt="Post media"></div>`;
  }
  
  const tagsHtml = post.tags ? `<p class="text-body-md">${post.tags.split(',').map(t => `<span class="text-primary">#${t.trim()}</span>`).join(' ')}</p>` : '';
  
  article.innerHTML = `
    <div class="p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full border-2 border-primary/30 p-0.5">
          <img class="w-full h-full rounded-full object-cover" src="${escapeHtml(post.avatar_url)}" alt="${escapeHtml(post.username)}">
        </div>
        <div>
          <p class="font-label-bold text-on-surface">${escapeHtml(post.display_name || post.username)} ${post.is_verified ? '<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings:\'FILL\'1;font-size:14px">verified</span>' : ''}</p>
          <p class="text-[10px] text-on-surface-variant"><a href="/profile.html?id=${post.user_id}" class="hover:text-primary">@${escapeHtml(post.username)}</a> • ${formatTime(post.created_at)}</p>
        </div>
      </div>
      <button class="material-symbols-outlined text-on-surface-variant">more_horiz</button>
    </div>
    ${mediaHtml}
    <div class="p-4 space-y-3">
      <div class="flex items-center gap-5">
        <button class="social-btn material-symbols-outlined ${post.is_liked ? 'text-error' : 'text-on-surface'}" onclick="toggleLike('${post.id}', this)" data-liked="${post.is_liked ? 'true' : 'false'}">${post.is_liked ? 'favorite' : 'favorite'}</button>
        <button class="social-btn material-symbols-outlined text-on-surface" onclick="showComments('${post.id}')">chat_bubble</button>
        <button class="social-btn material-symbols-outlined text-on-surface">send</button>
        <button class="ml-auto social-btn material-symbols-outlined ${post.is_bookmarked ? 'text-primary' : 'text-on-surface'}" onclick="toggleBookmark('${post.id}', this)" data-bookmarked="${post.is_bookmarked ? 'true' : 'false'}">bookmark</button>
      </div>
      <p class="text-body-md"><span class="font-bold mr-2">${escapeHtml(post.display_name || post.username)}</span>${escapeHtml(post.content || '')}</p>
      ${tagsHtml}
      <p class="text-[12px] text-on-surface-variant cursor-pointer hover:text-primary transition-colors" onclick="showComments('${post.id}')">View all ${post.comment_count} comments</p>
    </div>
  `;
  
  return article;
}

// Feed switching
function switchFeed(type) {
  currentFeed = type;
  const multiBtn = document.getElementById('toggle-multimedia');
  const litBtn = document.getElementById('toggle-literature');
  const multiFeed = document.getElementById('multimedia-feed');
  const litFeed = document.getElementById('literature-feed');
  
  if (type === 'multimedia') {
    multiBtn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg');
    multiBtn.classList.remove('text-on-surface-variant');
    litBtn.classList.remove('bg-primary', 'text-on-primary', 'shadow-lg');
    litBtn.classList.add('text-on-surface-variant');
    litFeed.classList.add('hidden');
    multiFeed.classList.remove('hidden');
  } else {
    litBtn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg');
    litBtn.classList.remove('text-on-surface-variant');
    multiBtn.classList.remove('bg-primary', 'text-on-primary', 'shadow-lg');
    multiBtn.classList.add('text-on-surface-variant');
    multiFeed.classList.add('hidden');
    litFeed.classList.remove('hidden');
  }
  currentPage = 1;
  loadFeed(type);
}

// Like toggle
async function toggleLike(postId, btn) {
  if (!requireAuth()) return;
  const isLiked = btn.dataset.liked === 'true';
  try {
    if (isLiked) {
      await unlikePost(postId);
      btn.dataset.liked = 'false';
      btn.classList.remove('text-error');
      btn.classList.add('text-on-surface');
    } else {
      await likePost(postId);
      btn.dataset.liked = 'true';
      btn.classList.add('text-error');
      btn.classList.remove('text-on-surface');
      showToast('Post liked!');
    }
    btn.style.transform = 'scale(1.5)';
    setTimeout(() => btn.style.transform = '', 200);
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// Bookmark toggle
async function toggleBookmark(postId, btn) {
  if (!requireAuth()) return;
  const isBookmarked = btn.dataset.bookmarked === 'true';
  try {
    if (isBookmarked) {
      await unbookmarkPost(postId);
      btn.dataset.bookmarked = 'false';
      btn.classList.remove('text-primary');
      btn.classList.add('text-on-surface');
    } else {
      await bookmarkPost(postId);
      btn.dataset.bookmarked = 'true';
      btn.classList.add('text-primary');
      btn.classList.remove('text-on-surface');
      showToast('Post saved!');
    }
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// Comments modal
function showComments(postId) {
  window.location.href = `/post.html?id=${postId}`;
}

// Create post modal
function showCreatePostModal() {
  document.getElementById('create-post-modal').classList.remove('hidden');
}

function hideCreatePostModal() {
  document.getElementById('create-post-modal').classList.add('hidden');
}

document.getElementById('submit-post-btn').addEventListener('click', async () => {
  const content = document.getElementById('post-content').value;
  const mediaUrl = document.getElementById('post-media-url').value;
  const type = document.getElementById('post-type').value;
  
  if (!content && !mediaUrl) {
    showToast('Add some content!', 'error');
    return;
  }
  
  try {
    await createPost(content || null, type, mediaUrl || null);
    showToast('Post published!');
    hideCreatePostModal();
    document.getElementById('post-content').value = '';
    document.getElementById('post-media-url').value = '';
    loadFeed(currentFeed);
  } catch (err) {
    showToast(err.message, 'error');
  }
});

// Load trending
async function loadTrending() {
  try {
    const data = await getTrending();
    const list = document.getElementById('trending-list');
    list.innerHTML = data.trending.map(t => `
      <div class="cursor-pointer group">
        <p class="text-[10px] text-on-surface-variant">${escapeHtml(t.category)} • Trending</p>
        <p class="font-label-bold text-on-surface group-hover:text-primary transition-colors">${escapeHtml(t.name)}</p>
        <p class="text-[10px] text-on-surface-variant">${t.post_count.toLocaleString()} Posts</p>
      </div>
    `).join('');
  } catch (err) {}
}

loadTrending();

// Load initial feed
loadFeed('multimedia');

// Infinite scroll
window.addEventListener('scroll', async () => {
  if (loading) return;
  const scrollHeight = document.documentElement.scrollHeight;
  const scrollTop = window.scrollY;
  const clientHeight = window.innerHeight;
  
  if (scrollTop + clientHeight >= scrollHeight - 400) {
    await loadFeed(currentFeed, currentPage + 1, true);
  }
});
</script>
</body></html>

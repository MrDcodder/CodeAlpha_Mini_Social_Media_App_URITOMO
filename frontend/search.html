<script src="/app.js"></script>
<script>
let searchTimeout;

document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 2) {
    document.getElementById('search-results').innerHTML = '<div class="text-center py-16 text-on-surface-variant"><span class="material-symbols-outlined text-6xl">travel_explore</span><p class="mt-4">Discover the grid</p></div>';
    return;
  }
  searchTimeout = setTimeout(() => performSearch(q), 300);
});

async function performSearch(q) {
  try {
    const data = await search(q);
    const results = document.getElementById('search-results');
    
    let html = '';
    
    if (data.users.length > 0) {
      html += '<h3 class="font-headline-md text-headline-md text-on-surface mb-4 mt-6">Users</h3><div class="space-y-3">';
      data.users.forEach(u => {
        html += `<a href="/profile.html?id=${u.id}" class="flex items-center gap-4 bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-4 hover:bg-surface-container transition-colors">
          <div class="w-12 h-12 rounded-full bg-surface-container-high overflow-hidden"><img class="w-full h-full object-cover" src="${escapeHtml(u.avatar_url)}"></div>
          <div><p class="font-label-bold text-on-surface">${escapeHtml(u.display_name)} ${u.is_verified ? '<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings:\'FILL\'1;font-size:14px">verified</span>' : ''}</p>
          <p class="text-sm text-on-surface-variant">@${escapeHtml(u.username)}</p></div>
        </a>`;
      });
      html += '</div>';
    }
    
    if (data.posts.length > 0) {
      html += '<h3 class="font-headline-md text-headline-md text-on-surface mb-4 mt-8">Posts</h3><div class="space-y-4">';
      data.posts.forEach(p => {
        html += `<div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-4">
          <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden"><img class="w-full h-full object-cover" src="${escapeHtml(p.avatar_url)}"></div>
          <span class="font-label-bold text-sm">${escapeHtml(p.display_name || p.username)}</span><span class="text-xs text-on-surface-variant">• ${formatTime(p.created_at)}</span></div>
          <p class="text-body-md">${escapeHtml(p.content?.substring(0,200))}${p.content?.length > 200 ? '...' : ''}</p>
          <div class="flex gap-4 mt-2 text-xs text-on-surface-variant"><span>${p.like_count} likes</span><span>${p.comment_count} comments</span></div>
        </div>`;
      });
      html += '</div>';
    }
    
    if (data.users.length === 0 && data.posts.length === 0) {
      html = '<div class="text-center py-16 text-on-surface-variant"><span class="material-symbols-outlined text-6xl">search_off</span><p class="mt-4">No results found</p></div>';
    }
    
    results.innerHTML = html;
  } catch (err) {
    document.getElementById('search-results').innerHTML = '<div class="text-center py-16 text-error">Search failed</div>';
  }
}
</script>
